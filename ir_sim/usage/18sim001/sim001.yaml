world:
  world_width: 20
  world_height: 20
  step_time: 0.1

robots:
  robot_number: 2
  robot_mode: 'diff'
  init_mode: 0
  init_state_list: [[2, 2, 0], [18, 2, 0]]
  goal_list: [[-5, -5], [-5, -5]] # goal 삭제
  radius_list: [0.3, 0.3] # 각 로봇의 물리적인 반지름 크기 (0.3m)
  vel_max: [1.5, 1.5] # 로봇의 최대 이동 속도 및 회전 속도 제한
  lidar2d: 
    id_list: [0, 1]       # 로봇의 인덱스 번호
    range_max: 4          # 센서가 감지할 수 있는 최대 거리 (4미터)
    number: 36            # 한 번에 쏘는 레이저 빔의 개수 (360도를 36개로 나누어 탐색)
    noise: false          # 센서 데이터에 노이즈(오차)를 섞을지 여부
    angle_min: -3.14      # 센서 탐색 범위의 시작 각도 (-π, 약 -180도)
    angle_max: 3.14       # 센서 탐색 범위의 끝 각도 (π, 약 180도) -> 즉, 주변 360도 전 방향 탐색

obs_lines:
  number: 8
  obs_line_states: [
    # [시작x, 시작y, 끝x, 끝y]
    [0, 0, 20, 0],        # 아래쪽 외곽 벽
    [20, 0, 20, 20],      # 오른쪽 외곽 벽
    [20, 20, 0, 20],      # 위쪽 외곽 벽
    [0, 20, 0, 0],        # 왼쪽 외곽 벽
    [0, 8, 14, 8],        # 미로 내부 가로 벽 1 (y=8 지점)
    [6, 14, 20, 14],      # 미로 내부 가로 벽 2 (y=14 지점)
    [10, 8, 10, 4],       # 미로 내부 세로 벽 1 (x=10, 아래쪽)
    [10, 14, 10, 18]      # 미로 내부 세로 벽 2 (x=10, 위쪽)
  ]